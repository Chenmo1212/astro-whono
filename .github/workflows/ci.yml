name: ci

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  ci:
    runs-on: ubuntu-latest
    environment: Blog
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Resolve Node version
        id: node
        shell: bash
        run: |
          if [ -f .nvmrc ]; then
            version="$(cat .nvmrc)"
          else
            version="$(grep -E '"node"\s*:' package.json | head -n 1 | sed -E 's/.*"node"\s*:\s*"([^"]+)".*/\1/')"
          fi
          if [ -z "$version" ]; then
            version="22"
          fi
          echo "version=$version" >> "$GITHUB_OUTPUT"

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: ${{ steps.node.outputs.version }}
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Security audit gate (high+ prod dependencies)
        run: npm run audit:prod

      - name: Run CI gate
        env:
          SITE_URL: ${{ vars.SITE_URL }}
          ENCRYPTION_PASSWORD: ${{ vars.ENCRYPTION_PASSWORD }}
          PUBLIC_API_BASE_URL: ${{ vars.PUBLIC_API_BASE_URL }}
        run: |
          echo "===================== PUBLIC_API_BASE_URL is: $PUBLIC_API_BASE_URL"
          npm run ci
      
      - name: Verify build output
        run: |
          echo "===================== Checking if PUBLIC_API_BASE_URL was injected..."
          grep -r "api.chenmo1212.cn" dist/client/ || echo "API URL not found in build output"

      - name: Deploy to Server
        uses: easingthemes/ssh-deploy@v2.2.11
        env:
          SSH_PRIVATE_KEY: ${{ secrets.PRIVATE_KEY }}
          ARGS: "-rltgoDzvO"
          SOURCE: "dist/client/"
          REMOTE_HOST: ${{ vars.REMOTE_HOST }}
          REMOTE_USER: 'root'
          TARGET: ${{ vars.TARGET }}
